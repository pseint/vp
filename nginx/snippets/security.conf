# =============================================================
# NGINX Snippet — Reglas de seguridad general reutilizables
# Uso: include /etc/nginx/snippets/security.conf;
#      (dentro de un server{} block de cualquier vhost)
# Generado: v20
# =============================================================

# ── Bloquear archivos sensibles universales ──────────────────
location ~ /\.(env|ht|git|svn|DS_Store)       { deny all; return 404; }
location ~ \.(sql|bak|log|conf|sh|config|ini)$ { deny all; return 404; }

# ── Bloquear user agents de scanners conocidos ───────────────
if ($http_user_agent ~* "nikto|sqlmap|nmap|masscan|zgrab|nessus|openvas|w3af|dirbuster|gobuster") {
    return 444;
}

# ── Bloquear métodos HTTP no necesarios ──────────────────────
# Solo GET, HEAD, POST, PUT, DELETE, OPTIONS permitidos
if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
    return 444;
}

# ── Limitar tamaño de URI ─────────────────────────────────────
# Protege contra ataques de buffer overflow via URIs largas
# Nginx tiene un límite interno pero este da 414 explícito
if ($request_uri ~* "^.{2048,}") {
    return 414;
}

# ── Proteger archivos de configuración PHP ───────────────────
location ~ wp-config\.php           { deny all; }
location ~ /phpinfo\.php            { deny all; return 404; }
location ~ /\.well-known/acme-challenge { allow all; }
