# =============================================================
# NGINX Snippet — Reglas de seguridad WordPress reutilizables
# Uso: include /etc/nginx/snippets/wordpress.conf;
#      (dentro de un server{} block de vhost WordPress)
# Generado: v20
# =============================================================

# ── Bloquear ejecución de PHP en uploads ─────────────────────
# Previene RCE via shell upload (shell.php.jpg, etc.)
location ~* /wp-content/uploads/.*\.php$ {
    deny all;
    return 404;
}

# ── Bloquear acceso a archivos sensibles WP ──────────────────
location ~* /(wp-config\.php|readme\.html|license\.txt|wp-cli\.phar) {
    deny all;
    return 404;
}

# ── Deshabilitar XML-RPC (vector de fuerza bruta y DDoS) ─────
# Excepto si usas JetPack/app móvil — en ese caso comenta esto
location = /xmlrpc.php {
    deny all;
    return 444;
}

# ── Proteger wp-login.php (brute force) ──────────────────────
# Usa la zona 'login' (1r/s, burst=3) definida en nginx.conf
location = /wp-login.php {
    limit_req zone=login burst=3 nodelay;
    fastcgi_pass php-fpm;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    fastcgi_param HTTPS on;
    fastcgi_cache off;
    fastcgi_no_cache 1;
}

# ── Bloquear archivos ocultos y de control de versiones ──────
location ~ /\.(env|ht|git|svn|DS_Store) {
    deny all;
    return 404;
}

# ── Área de administración WordPress ─────────────────────────
# Excluida del FastCGI cache siempre (sesión activa = no cache)
location ~* ^/wp-admin/ {
    fastcgi_pass php-fpm;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    fastcgi_param HTTPS on;
    fastcgi_param HTTP_X_REQUEST_ID $request_id;
    fastcgi_cache off;
    fastcgi_no_cache 1;
    fastcgi_read_timeout 300;
    limit_req zone=general burst=20 nodelay;
}

# ── Bloquear user agents de scanners WordPress ───────────────
if ($http_user_agent ~* "WPScan|wpscan|sqlmap|nikto|nmap|masscan") {
    return 444;
}
