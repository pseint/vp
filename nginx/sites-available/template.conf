# =============================================================
# NGINX — Template de Virtual Host PHP
# Copiar y renombrar: cp template.conf DOMINIO.conf
# O usar: scripts/add-vhost.sh DOMINIO [php|static|wordpress]
# Variables a reemplazar: %%DOMAIN%%, %%DOMAIN_SAFE%%, %%DOCROOT%%
# =============================================================

server {
    listen 80;
    server_name %%DOMAIN%% www.%%DOMAIN%%;

    root %%DOCROOT%%;
    index index.php index.html index.htm;

    # Logs por dominio
    access_log /var/log/nginx/%%DOMAIN%%.access.log main_json;
    error_log  /var/log/nginx/%%DOMAIN%%.error.log warn;

    # ── Rate limiting y límites ──────────────────────────────
    limit_conn conn_limit 30;
    limit_req zone=general burst=50 nodelay;
    client_max_body_size 100m;

    # ── Bloquear user agents maliciosos ─────────────────────
    if ($http_user_agent ~* "nikto|sqlmap|nmap|masscan|zgrab|nessus") {
        return 444;
    }

    # ── Archivos estáticos (cache agresivo) ─────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── PHP ──────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $document_root;
        fastcgi_param SERVER_NAME     $host;
        fastcgi_param HTTPS           on;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
        fastcgi_param HTTP_SCHEME     https;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 300;

        # FIX v20: FastCGI cache activo — cachea respuestas PHP anónimas (solo GET/HEAD)
        # $skip_cache_post (definida en nginx.conf) vale 1 para POST/PUT/PATCH/DELETE
        # → formularios, checkout, login NUNCA se cachean
        fastcgi_cache FASTCGI_CACHE;
        fastcgi_cache_valid 200 301 302 10m;
        fastcgi_cache_bypass $skip_cache_post $cookie_logged_in $cookie_wordpress_logged_in
                             $cookie_PHPSESSID $http_authorization $http_pragma;
        fastcgi_no_cache    $skip_cache_post $cookie_logged_in $cookie_wordpress_logged_in
                            $cookie_PHPSESSID $http_authorization $http_pragma;
        add_header X-FastCGI-Cache $upstream_cache_status;
    }

    # ── Archivos ocultos y sensibles ─────────────────────────
    location ~ /\.(ht|git|svn|env|DS_Store) { deny all; return 404; }
    location ~ \.(sql|bak|log|conf|env|sh|config)$ { deny all; return 404; }
    location ~ wp-config\.php { deny all; }
    location ~ xmlrpc\.php    { deny all; return 444; }

    # ── Main location ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Páginas de error ─────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /var/www/html/default; internal; }
    location = /50x.html { root /var/www/html/default; internal; }
}
