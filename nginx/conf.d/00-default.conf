# =============================================================
# NGINX — Servidor default y upstream PHP-FPM
# =============================================================

# ── Upstream PHP-FPM ─────────────────────────────────────────
upstream php-fpm {
    server php-fpm:9000;
    keepalive 32;
}

# ── Servidor default (captura todo lo no definido) ────────────
server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/default;
    index index.php index.html;

    # Health check para Traefik (sin rate limit)
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # FPM status y ping (solo redes internas Docker)
    location ~ ^/(fpm-status|fpm-ping)$ {
        access_log off;
        fastcgi_pass php-fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        allow 127.0.0.1;
        allow 172.16.0.0/12;   # Docker networks (172.17/16, 172.20/16, 172.21/24…)
        allow 10.0.0.0/8;
        deny all;
    }

    # Bloquear user agents de scanners conocidos
    if ($http_user_agent ~* "nikto|sqlmap|nmap|masscan|zgrab|nessus|openvas|w3af|dirbuster|gobuster") {
        return 444;
    }

    # PHP
    location ~ \.php$ {
        limit_req zone=general burst=20 nodelay;
        try_files $uri =404;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS on;
        # FIX v19: propagar request_id para trazabilidad end-to-end (igual que template.conf)
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }

    # Archivos estáticos con cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Bloquear archivos sensibles
    location ~ /\.(ht|git|svn|env|DS_Store) { deny all; return 404; }
    location ~ \.(env|log|bak|config|sql|sh|ini)$ { deny all; return 404; }
    location ~ wp-config\.php { deny all; }
    location ~ xmlrpc\.php   { deny all; }

    location / {
        limit_conn conn_limit 20;
        limit_req  zone=general burst=30 nodelay;
        try_files  $uri $uri/ /index.php?$query_string;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /var/www/html/default; internal; }
    location = /50x.html { root /var/www/html/default; internal; }
}
