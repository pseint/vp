# =============================================================
# NGINX — Configuración global
# Archivo: /opt/hosting/nginx/nginx.conf
# Optimizado para ARM64, detrás de Traefik
# =============================================================

user  nginx;
# Usar núcleos disponibles (Oracle Free = 4 OCPUs)
worker_processes auto;
worker_cpu_affinity auto;
pid /var/run/nginx.pid;

# Límite de archivos abiertos
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Básico ───────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # Ocultar versión de Nginx
    server_tokens off;

    # ── Logging ──────────────────────────────────────────────
    log_format main_json escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"forwarded_for":"$http_x_forwarded_for",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"referrer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"host":"$host",'
        '"request_id":"$request_id"'
      '}';

    # Propagar request_id a backends para trazabilidad end-to-end
    add_header X-Request-ID $request_id always;

    access_log /var/log/nginx/access.log main_json buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    reset_timedout_connection on;
    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          30s;

    # ── Buffers ───────────────────────────────────────────────
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    client_max_body_size        100m;
    large_client_header_buffers 4 8k;
    output_buffers              1 32k;
    postpone_output             1460;

    # ── Compresión GZIP ──────────────────────────────────────
    gzip              on;
    gzip_static       on;   # Servir .gz pre-comprimidos si existen
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/javascript
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/xml;


    # ── FastCGI cache — no cachear nunca requests POST ───────────
    # FIX v20: POST requests (login, checkout, formularios) NUNCA deben cachearse.
    # La fastcgi_cache_key incluye $request_method (diferencia GET/POST en clave),
    # pero sin este map las respuestas POST igual se almacenan en cache.
    # Uso: incluir $skip_cache_post en fastcgi_cache_bypass y fastcgi_no_cache.
    map $request_method $skip_cache_post {
        default 0;
        POST    1;
        PUT     1;
        PATCH   1;
        DELETE  1;
    }

    # ── Cache de archivos abiertos ───────────────────────────
    open_file_cache          max=50000 inactive=60s;
    open_file_cache_valid    120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── SSL session cache (performance HTTPS) ────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Seguridad ────────────────────────────────────────────
    # Traefik agrega headers de seguridad completos (HSTS, CSP, etc.)
    # Solo añadir lo que Traefik no cubre o que Nginx necesita globalmente
    add_header X-Content-Type-Options nosniff always;
    # X-Frame-Options manejado por Traefik security-headers middleware
    # add_header X-Frame-Options SAMEORIGIN always;  # comentado para evitar duplicado

    # ── FastCGI cache global (para PHP) ──────────────────────
    fastcgi_cache_path /var/cache/nginx/fastcgi
        levels=1:2
        keys_zone=FASTCGI_CACHE:10m
        max_size=200m
        inactive=60m
        use_temp_path=off;
    # FIX v19: quitado $scheme — siempre es https detrás de Traefik, añadía longitud sin valor
    fastcgi_cache_key "$request_method$host$request_uri";
    fastcgi_cache_use_stale error timeout invalid_header http_500;
    fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
    # FIX v16: evita cache stampede — solo 1 request va al backend cuando la cache expira
    fastcgi_cache_lock on;
    fastcgi_cache_lock_timeout 5s;

    # ── Real IP desde Traefik ─────────────────────────────────
    # FIX v19: cubrir TODOS los rangos posibles de red Docker + Oracle VCN
    # 172.16.0.0/12  — toda la clase B privada (incluye 172.17-172.31, default Docker bridge)
    # 10.0.0.0/8     — Oracle VCN y redes internas del VPS
    # 172.20.0.0/16  — red hosting_default definida en docker-compose
    # 172.21.0.0/24  — red hosting_internal definida en docker-compose
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.20.0.0/16;
    set_real_ip_from 172.21.0.0/24;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ── Rate Limiting Zones ───────────────────────────────────
    # Zona general: 10 req/s por IP (burst 30)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # Zona para login/wp-login: 1 req/s muy estricta
    limit_req_zone $binary_remote_addr zone=login:10m   rate=1r/s;
    # Zona para APIs: 30 req/s
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
    # Compatibilidad con la zona "one" usada en configs viejas
    limit_req_zone $binary_remote_addr zone=one:10m     rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    # BUG FIX v15: Nginx devuelve 503 por defecto en rate-limit — fail2ban filtra 429.
    # Sin esto el jail nginx-limit-req NUNCA se activa porque los logs muestran 503.
    limit_req_status 429;
    limit_conn_status 429;

    # ── Configuraciones de sitios ────────────────────────────
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*.conf;
}
