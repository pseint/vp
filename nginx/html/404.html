<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Página no encontrada</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;
         color:#e2e8f0;min-height:100vh;display:flex;align-items:center;
         justify-content:center;padding:2rem}
    .card{text-align:center;padding:3rem 2rem;max-width:480px;width:100%}
    .code{font-size:6rem;font-weight:800;line-height:1;
          background:linear-gradient(135deg,#60a5fa,#818cf8);
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;
          margin-bottom:1rem}
    h1{font-size:1.5rem;font-weight:600;color:#f1f5f9;margin-bottom:.75rem}
    p{color:#94a3b8;font-size:.9375rem;line-height:1.6}
    .btn{display:inline-block;margin-top:2rem;padding:.75rem 1.75rem;
         background:#3b82f6;color:#fff;text-decoration:none;border-radius:.5rem;
         font-weight:500;transition:background .2s}
    .btn:hover{background:#2563eb}
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>El recurso que buscas no existe o fue movido.</p>
    <a href="/" class="btn">← Volver al inicio</a>
  </div>
</body>
</html>
