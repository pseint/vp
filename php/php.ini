; =============================================================
; PHP 8.3 — Configuración para producción
; Archivo: /opt/hosting/php/php.ini
; =============================================================

[PHP]
; ── Motor ─────────────────────────────────────────────────────
engine                       = On
short_open_tag               = Off
precision                     = 14
output_buffering             = 4096
zlib.output_compression      = Off
implicit_flush               = Off
serialize_precision          = -1
disable_functions            = exec,passthru,shell_exec,system,popen
disable_classes              =
expose_php                   = Off

; ── Recursos ──────────────────────────────────────────────────
max_execution_time           = 300
max_input_time               = 300
memory_limit                 = 256M
max_input_vars               = 5000

; ── Upload ────────────────────────────────────────────────────
file_uploads                 = On
upload_max_filesize          = 100M
post_max_size                = 105M
max_file_uploads             = 20

; ── Errores (PRODUCCIÓN: no mostrar, sí loguear) ─────────────
error_reporting              = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors               = Off
display_startup_errors       = Off
log_errors                   = On
error_log                    = /dev/stderr
log_errors_max_len           = 1024
ignore_repeated_errors       = Off
ignore_repeated_source       = Off
html_errors                  = Off

; ── Seguridad ─────────────────────────────────────────────────
allow_url_fopen              = On
allow_url_include            = Off

; ── Sesiones ──────────────────────────────────────────────────
session.save_handler         = redis
; setup-env.sh reemplaza 7Xqj64qplb4TFoXjDqnSLT8SNlPL9KUO con la contraseña real
; www.conf inyecta $REDIS_PASS como env var en el proceso PHP-FPM
session.save_path            = "tcp://redis:6379?auth=7Xqj64qplb4TFoXjDqnSLT8SNlPL9KUO&database=1"
session.use_strict_mode      = 1
session.use_cookies          = 1
session.use_only_cookies     = 1
session.name                 = PHPSESSID
session.auto_start           = 0
session.cookie_lifetime      = 0
session.cookie_secure        = 1
session.cookie_httponly      = 1
; FIX v19: Strict rompe OAuth, PayPal return URLs, Google Login y cualquier redirect cross-site.
; Lax permite GET cross-site (OAuth redirect) pero bloquea POST cross-site (CSRF protection intacta).
session.cookie_samesite      = Lax
session.serialize_handler    = php_serialize
session.gc_probability       = 1
session.gc_divisor           = 1000
session.gc_maxlifetime       = 1440
session.cache_limiter        = nocache
session.cache_expire         = 180

; ── Performance (PHP include/require cache) ─────────────────────
; realpath_cache evita stat() repetitivo en cada include/require
realpath_cache_size          = 4096K
realpath_cache_ttl           = 600

; ── Upload tmp ────────────────────────────────────────────────
; Separar uploads de /tmp para evitar colisión con sesiones
upload_tmp_dir               = /tmp/php-uploads

; ── Date ──────────────────────────────────────────────────────
date.timezone                = America/Lima

; ── MySQLi / PDO ─────────────────────────────────────────────
mysqli.max_persistent        = -1
mysqli.allow_persistent      = On
mysqli.max_links             = -1
mysqli.default_socket        =
mysqli.default_host          = mariadb
mysqli.default_port          = 3306

; ── Intl ──────────────────────────────────────────────────────
intl.default_locale          = es_PE

; ── OPcache (también configurado en conf.d) ──────────────────
[opcache]
opcache.enable               = 1
opcache.enable_cli           = 0
opcache.memory_consumption   = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.max_wasted_percentage = 10
opcache.use_cwd              = 1
opcache.validate_timestamps  = 0
opcache.revalidate_freq      = 0
opcache.save_comments        = 1
opcache.fast_shutdown        = 1
opcache.enable_file_override = 0

; ── OPcache JIT (PHP 8.x — mejora rendimiento ~15-30% en ARM64) ──────
; jit=1254: tracing JIT — más seguro en ARM64 que 1255 (que puede causar
; segfaults en algunas compilaciones de Alpine/aarch64)
; 1254 = ON + tracing mode (recomendado para producción ARM64)
; 1255 = ON + tracing + optimize all (más agresivo, puede ser inestable)
; 0    = desactivado (si experimentas crashes, comenta las dos líneas)
opcache.jit                  = 1254
opcache.jit_buffer_size      = 64M   ; FIX v16: 128M es excesivo en ARM64 con 4GB RAM
