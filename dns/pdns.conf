# =============================================================
# POWERDNS — Servidor DNS autoritativo
# Archivo: /opt/hosting/dns/pdns.conf
# =============================================================
# by dave
# ── Backend de base de datos (MariaDB/MySQL) ─────────────────
launch=gmysql
gmysql-host=mariadb
gmysql-port=3306
gmysql-dbname=powerdns
gmysql-user=pdns
gmysql-password=nuId82yg3fnamDXrMS8vbBLqyYtctaZ4
gmysql-dnssec=yes

# ── Red y puertos ─────────────────────────────────────────────
local-address=0.0.0.0
local-port=53

# ── API REST ──────────────────────────────────────────────────
api=yes
api-key=b567a48d6830945320d7939020a7717a22716af3b9997008be966c71dd68835a
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
# BUG FIX v15: 172.0.0.0/8 era demasiado amplio — exponía la API PowerDNS
# a 172.0.0.0-172.15.255.255 que NO son IPs privadas RFC 1918.
# El rango privado correcto es 172.16.0.0/12 (172.16.x.x - 172.31.x.x).
webserver-allow-from=127.0.0.1,::1,172.16.0.0/12,10.0.0.0/8,192.168.0.0/16

# ── Configuración autoritativa ────────────────────────────────
# Solo responde por zonas en nuestra base de datos
#local-config-dir=/etc/powerdns/conf.d

# Deshabilitar recursión (somos autoritativos, no recursivos)
disable-axfr=no

# Permitir AXFR (transferencia de zonas) solo desde localhost
allow-axfr-ips=127.0.0.1,::1

# ── Rendimiento (optimizado para ARM64 Oracle Free) ───────────
# Hilos de distribución (max 4 para Oracle Free 4 OCPUs)
distributor-threads=2
receiver-threads=2

# Cache de paquetes DNS (reduce consultas a DB)
cache-ttl=20
negquery-cache-ttl=60
query-cache-ttl=20

# Pool de conexiones a la base de datos (sin socket — usamos TCP)

# ── Seguridad ─────────────────────────────────────────────────
# No exponer versión de PowerDNS
version-string=anonymous

# Denegar respuestas vacías de ANY
any-to-tcp=yes

# ── Logging ──────────────────────────────────────────────────
loglevel=3
log-dns-queries=no
log-dns-details=no

# ── DNSSEC ───────────────────────────────────────────────────
#dnssec=yes
#default-ksk-algorithms=ecdsa256
#default-zsk-algorithms=

# ── Estadísticas (para monitoreo) ────────────────────────────
