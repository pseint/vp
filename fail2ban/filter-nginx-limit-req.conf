# =============================================================
# FAIL2BAN — Filtro para Nginx rate limiting (429)
# Detecta IPs que disparan el rate limit de Nginx
# =============================================================
[INCLUDES]
before = common.conf

[Definition]
# Líneas de log como:
# {"status":429,"remote_addr":"1.2.3.4",...}
# o el formato clásico de Nginx:
# 2024/01/01 12:00:00 [error] limiting requests, excess: 5.000 by zone "general", client: 1.2.3.4
failregex = ^.*"remote_addr":"<HOST>".*"status":429.*$
            ^.*\[error\].*limiting requests.*client: <HOST>.*$
            ^<HOST> -.*"(GET|POST|HEAD|PUT|DELETE).*" 429.*$

ignoreregex = ^.*"remote_addr":"127\.0\.0\.1".*$
              ^.*"remote_addr":"172\.\d+\.\d+\.\d+".*$
              ^.*"remote_addr":"10\.\d+\.\d+\.\d+".*$
