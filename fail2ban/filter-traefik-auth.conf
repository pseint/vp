# =============================================================
# FAIL2BAN — Filtro para Traefik (logs en formato JSON)
# Detecta: 401/403 en el dashboard de Traefik
# =============================================================
[INCLUDES]
before = common.conf

[Definition]
# Traefik access log JSON format:
# {"ClientHost":"1.2.3.4","DownstreamStatus":401,"RequestMethod":"GET","RequestPath":"/dashboard/","Duration":...}
failregex = ^.*"ClientHost":"<HOST>".*"DownstreamStatus":(401|403).*$

ignoreregex = ^.*"ClientHost":"127\.0\.0\.1".*$
              ^.*"ClientHost":"172\.\d+\.\d+\.\d+".*$
              ^.*"ClientHost":"10\.\d+\.\d+\.\d+".*$
