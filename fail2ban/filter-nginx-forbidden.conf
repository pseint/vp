# =============================================================
# FAIL2BAN — Filtro para escaneos y accesos prohibidos Nginx
# Detecta bots/scanners que generan muchos 403/404
# =============================================================
[INCLUDES]
before = common.conf

[Definition]
failregex = ^<HOST> -.*"(GET|POST|HEAD|PUT|DELETE).*(\.php|\.asp|\.jsp|\.cgi|wp-login|xmlrpc|\.env|\.git|\.svn|config|setup|install|admin|backup|shell|cmd|exec).*" (403|404|444) .*$
            ^.*"remote_addr":"<HOST>".*"status":(403|404|444).*"request":"(GET|POST|HEAD) .*(\.php|wp-login|xmlrpc|\.env|\.git|admin|shell).*$

ignoreregex = ^.*"remote_addr":"127\.0\.0\.1".*$
              ^.*"remote_addr":"172\.\d+\.\d+\.\d+".*$
              ^<HOST> -.*\.(css|js|png|jpg|jpeg|gif|ico|woff|svg|webp) (403|404).*$
