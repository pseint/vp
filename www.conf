; =============================================================
; PHP-FPM — Pool de procesos optimizado para ARM64 Oracle Free
; Archivo: /opt/hosting/php/www.conf
; =============================================================

[www]
; Escuchar en socket TCP (mejor rendimiento con Nginx en Docker)
listen = 0.0.0.0:9000
listen.backlog = 511

; Usuario y grupo del proceso
user  = www-data
group = www-data

; ── Gestión de procesos ───────────────────────────────────────
; dynamic: ajuste automático de workers
pm = dynamic

; Máximo de procesos hijo
; Oracle Free 24GB: cada proceso PHP usa ~32-64MB → 20 procesos ≈ 640MB máx bajo PHP_MEM=512m
; Para aprovechar más RAM aumenta PHP_MEM en .env y sube max_children
pm.max_children = 20

; Procesos al arrancar
pm.start_servers = 4

; Mínimo de procesos idle
pm.min_spare_servers = 2

; Máximo de procesos idle
pm.max_spare_servers = 8

; Idle timeout — liberar workers inactivos más rápido
pm.process_idle_timeout = 60s

; Solicitudes antes de reiniciar un proceso (evita memory leaks)
pm.max_requests = 500

; ── Timeouts ──────────────────────────────────────────────────
request_terminate_timeout = 300s
request_slowlog_timeout   = 10s
slowlog                   = /proc/self/fd/2

; ── Entorno del proceso ──────────────────────────────────────
; FIX v20: clear_env = no — sin esto, solo las variables explícitamente listadas
; en env[] son accesibles desde PHP vía getenv(). Con esta opción, TODAS las
; env vars del contenedor Docker están disponibles (plugins, apps legacy, etc.)
clear_env = no

; ── Variables de entorno ─────────────────────────────────────
env[HOSTNAME]       = $HOSTNAME
env[PATH]           = /usr/local/bin:/usr/bin:/bin
env[TMP]            = /tmp
env[TMPDIR]         = /tmp
env[TEMP]           = /tmp
; REDIS_PASS inyectado desde docker-compose environment
; usado por php.ini session.save_path cuando REDIS_PASS_PLACEHOLDER no fue reemplazado
env[REDIS_PASS]     = $REDIS_PASS
env[DB_HOST]        = $DB_HOST
env[DB_USER]        = $DB_USER
env[DB_PASS]        = $DB_PASS

; ── PHP flags de producción ───────────────────────────────────
php_admin_flag[log_errors]          = on
php_admin_value[error_log]          = /proc/self/fd/2
php_admin_value[memory_limit]       = 256M
php_admin_value[upload_max_filesize] = 100M
php_admin_value[post_max_size]       = 105M
; Restringir PHP a directorios necesarios (seguridad)
; Evita que PHP lea /etc/passwd, /etc/shadow, etc.
; BUG FIX v15: añadido /usr/local/share/php — extensiones Alpine instalan
; archivos PHP allí (e.g. PEAR, algunos componentes de pecl). Sin esto,
; FIX v19: añadidos /proc/self/fd (PHP internal file descriptors) y /dev/null (discard output).
; Sin ellos: error_log, proc_open() y streams internos fallan con "open_basedir restriction" silenciosamente.
php_admin_value[open_basedir]        = /var/www/html:/tmp:/tmp/php-uploads:/usr/local/lib/php:/usr/local/share/php:/usr/share/php:/proc/self/fd:/dev/null

; ── Status y ping (para monitoreo) ───────────────────────────
pm.status_path  = /fpm-status
ping.path       = /fpm-ping
ping.response   = pong

; ── Logging ───────────────────────────────────────────────────
access.log         = /proc/self/fd/2
access.format      = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}dms %{kilo}Mk %C%%"
